services:
  agentshield:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # Ollama runs natively on Mac (Metal GPU). Docker connects to it via host.
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
