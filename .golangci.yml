version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - forbidigo

  settings:
    forbidigo:
      forbid:
        - pattern: '^os\.Getenv$'
          msg: "Read environment variables in package config only; pass *config.Config to consumers."
        - pattern: '^os\.LookupEnv$'
          msg: "Read environment variables in package config only; pass *config.Config to consumers."
      exclude-godoc-examples: false
      analyze-types: true

  exclusions:
    rules:
      - path: 'config/.*\.go'
        linters:
          - forbidigo
      # cmd/mcp-mock is a standalone demo binary (its own main package),
      # not an agentshield consumer — its env vars (MCP_MOCK_PORT,
      # MCP_MOCK_BIND) are scoped to itself and never read by the agent.
      # Routing them through agentshield's config struct would add cross-
      # binary coupling for zero benefit.
      - path: 'cmd/mcp-mock/.*\.go'
        linters:
          - forbidigo
