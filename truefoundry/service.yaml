# AgentShield — TrueFoundry Service Manifest
# Deploy: tfy apply -f truefoundry/service.yaml --workspace <WORKSPACE_FQN>

name: agentshield
type: service

image:
  type: build
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: .

ports:
  - port: 8080
    expose: true
    app_protocol: HTTP

resources:
  cpu_request: 0.25
  cpu_limit: 1.0
  memory_request: 256
  memory_limit: 512

replicas: 1

env:
  PORT: "8080"
  # Reference the Ollama endpoint secret created in your workspace:
  #   tfy secret create --name OLLAMA_URL --value "http://<host>:11434"
  OLLAMA_URL:
    value_from:
      type: secret
      secret_fqn: "secret:OLLAMA_URL"

liveness_probe:
  type: http
  path: /health
  port: 8080
  initial_delay_seconds: 10
  period_seconds: 15

readiness_probe:
  type: http
  path: /health
  port: 8080
  initial_delay_seconds: 5
  period_seconds: 10
